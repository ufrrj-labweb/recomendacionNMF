services:
  api:
    build:
      context: ${NMF_CONTEXT:-./recomendaciones/nmf_api}
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@cspostgres2:5432/campsocialdb"
      OFFER_DATA_PATHS: "/data/classes.json,/data/vacantes.json"
      ONESIGNAL_APP_ID: ""
      ONESIGNAL_API_KEY: ""
      ONESIGNAL_API_URL: "https://onesignal.com/api/v1/notifications"
      ONESIGNAL_LANG: "es"
    volumes:
      - ../classes.json:/data/classes.json:ro
      - ../vacantes.json:/data/vacantes.json:ro
    networks:
      - cidade-social-net
networks:
  cidade-social-net:
    external: true
